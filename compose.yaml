services:
  web:
    image: nginx:alpine
    container_name: webguard-web

    environment:
      TZ: Asia/Ho_Chi_Minh

    ports:
      - "8080:80"

    volumes:
      - ./app/public:/usr/share/nginx/html:ro
      - ./app/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

    restart: unless-stopped

    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1/health | grep -q ok
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
